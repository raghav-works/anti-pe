name: Build Windows EXE

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-exe:
    name: Build anti_pe_scanner.exe
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show Python and repository info
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python --version
          python -m pip --version

          Write-Host "Repository root:"
          Get-Location

          Write-Host "Top-level files:"
          Get-ChildItem

      - name: Verify required project files
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $requiredFiles = @(
            "requirements.txt",
            "tools\scan_file.py",
            "tools\build_exe.py",
            "configs\policy.json",
            "models\lightgbm_pe_v1\model.txt",
            "models\lightgbm_pe_v1\metadata.json",
            "models\lightgbm_pe_v1\thresholds.json",
            "models\lightgbm_pe_v1\feature_config.json"
          )

          foreach ($file in $requiredFiles) {
            if (!(Test-Path $file)) {
              throw "Required file is missing: $file"
            }
            else {
              Write-Host "Found: $file"
            }
          }

      - name: Normalize LightGBM model line endings
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $modelPath = "models\lightgbm_pe_v1\model.txt"

          Write-Host "Normalizing LightGBM model line endings to LF..."

          $bytesBefore = [System.IO.File]::ReadAllBytes($modelPath)
          Write-Host "Model size before normalization: $($bytesBefore.Length)"
          Write-Host "CRLF count before: $([regex]::Matches([System.Text.Encoding]::UTF8.GetString($bytesBefore), "`r`n").Count)"
          Write-Host "CR count before: $([regex]::Matches([System.Text.Encoding]::UTF8.GetString($bytesBefore), "`r").Count)"

          $content = [System.Text.Encoding]::UTF8.GetString($bytesBefore)
          $content = $content -replace "`r`n", "`n"
          $content = $content -replace "`r", "`n"

          $utf8NoBom = New-Object System.Text.UTF8Encoding($false)
          [System.IO.File]::WriteAllText($modelPath, $content, $utf8NoBom)

          $bytesAfter = [System.IO.File]::ReadAllBytes($modelPath)
          Write-Host "Model size after normalization: $($bytesAfter.Length)"
          Write-Host "CRLF count after: $([regex]::Matches([System.Text.Encoding]::UTF8.GetString($bytesAfter), "`r`n").Count)"
          Write-Host "CR count after: $([regex]::Matches([System.Text.Encoding]::UTF8.GetString($bytesAfter), "`r").Count)"

          Write-Host "First 10 lines:"
          Get-Content $modelPath -TotalCount 10

      - name: Install dependencies
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pytest

      - name: Verify Python imports
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $ErrorActionPreference = "Stop"

          python -c "import numpy; print('numpy OK')"
          python -c "import lightgbm; print('lightgbm OK', lightgbm.__version__)"
          python -c "import lief; print('lief OK')"
          python -c "import watchdog; print('watchdog OK')"
          python -c "import PyInstaller; print('PyInstaller OK')"

      - name: Verify LightGBM model file
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $ErrorActionPreference = "Stop"

          $script = @'
          from pathlib import Path
          import lightgbm as lgb

          model_path = Path("models/lightgbm_pe_v1/model.txt")
          data = model_path.read_bytes()

          print("Model path:", model_path)
          print("Model size:", len(data))
          print("CRLF count:", data.count(b"\r\n"))
          print("CR count:", data.count(b"\r"))
          print("LF count:", data.count(b"\n"))
          print("Tree count:", data.count(b"Tree="))
          print("Contains end of trees:", b"end of trees" in data)

          print("First 10 lines:")
          for line in data.splitlines()[:10]:
              print(line[:200])

          booster = lgb.Booster(model_file=str(model_path))
          print("Model loaded OK")
          print("num_feature:", booster.num_feature())
          print("num_trees:", booster.num_trees())

          assert booster.num_feature() == 2381
          assert booster.num_trees() == 1000
          '@

          Set-Content -Path check_model.py -Value $script -Encoding UTF8
          python check_model.py

      - name: Verify scanner model package loader
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $ErrorActionPreference = "Stop"

          python -c "from anti_pe_scanner.model_loader import LightGBMModelPackage; p = LightGBMModelPackage('models/lightgbm_pe_v1'); p.load(); print('scanner model package OK')"

      - name: Run tests
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $ErrorActionPreference = "Stop"

          python -m pytest -q

      - name: Clean old build outputs
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

          if (Test-Path anti_pe_scanner.spec) {
            Remove-Item anti_pe_scanner.spec -Force
          }

      - name: Build Windows executable
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $ErrorActionPreference = "Stop"

          python tools\build_exe.py

      - name: Verify EXE and handover package
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          if (!(Test-Path "dist\anti_pe_scanner.exe")) {
            throw "Windows EXE was not created: dist\anti_pe_scanner.exe"
          }

          if (!(Test-Path "dist\models\lightgbm_pe_v1\model.txt")) {
            throw "Model file was not copied into dist\models\lightgbm_pe_v1"
          }

          if (!(Test-Path "dist\configs\policy.json")) {
            throw "Policy file was not copied into dist\configs"
          }

          Write-Host "Final dist tree:"
          tree dist /F

      - name: Smoke test EXE on non-PE file
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          "hello this is not a PE file" | Out-File -Encoding utf8 smoke_test.txt

          $output = .\dist\anti_pe_scanner.exe --file smoke_test.txt
          Write-Host $output

          $json = $output | ConvertFrom-Json

          if ($json.scan_status -ne "skipped_not_pe") {
            throw "Smoke test failed. Expected scan_status skipped_not_pe but got $($json.scan_status)"
          }

          Write-Host "Smoke test passed."

      - name: Upload Windows handover package
        uses: actions/upload-artifact@v4
        with:
          name: anti_pe_scanner_windows_handover
          path: dist/
          if-no-files-found: error
          retention-days: 14
