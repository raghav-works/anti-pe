name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout selected branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show source revision
        shell: pwsh
        run: |
          Write-Host "Branch: $env:GITHUB_REF_NAME"
          Write-Host "Commit: $env:GITHUB_SHA"
          git status
          git log -1 --oneline

      - name: Verify optimized source exists
        shell: pwsh
        run: |
          $requiredFiles = @(
            "src\anti_pe_scanner\prepared_pe.py",
            "src\anti_pe_scanner\server.py",
            "tests\test_prepared_pe.py",
            "tests\test_server_mode.py",
            "tests\test_optimization_parity.py",
            "tools\benchmark_latency.py"
          )

          foreach ($file in $requiredFiles) {
            if (-not (Test-Path $file)) {
              throw "Optimized source file is missing: $file"
            }

            Write-Host "Found: $file"
          }

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pyinstaller pytest

      - name: Verify optimized CLI
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          $helpOutput = python tools\scan_file.py --help | Out-String
          Write-Host $helpOutput

          if ($helpOutput -notmatch "--server") {
            throw "The optimized --server option is missing."
          }

          if ($helpOutput -notmatch "--cache-size") {
            throw "The optimized --cache-size option is missing."
          }

          if ($helpOutput -notmatch "--num-threads") {
            throw "The optimized --num-threads option is missing."
          }

      - name: Run tests
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          python -m pytest -q
          python -m compileall -q src tools tests

      - name: Clean previous build
        shell: pwsh
        run: |
          if (Test-Path build) {
            Remove-Item build -Recurse -Force
          }

          if (Test-Path dist) {
            Remove-Item dist -Recurse -Force
          }

      - name: Build onefile and onedir variants
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          python tools\build_exe.py --variant both

      - name: Verify built executables
        shell: pwsh
        run: |
          $onedirExe = "dist\onedir\anti_pe_scanner\anti_pe_scanner.exe"
          $onefileExe = "dist\onefile\anti_pe_scanner.exe"

          if (-not (Test-Path $onedirExe)) {
            throw "Onedir executable was not created: $onedirExe"
          }

          if (-not (Test-Path $onefileExe)) {
            throw "Onefile executable was not created: $onefileExe"
          }

          $onedirHelp = & $onedirExe --help 2>&1 | Out-String
          Write-Host $onedirHelp

          if ($onedirHelp -notmatch "--server") {
            throw "Built onedir executable does not contain server mode."
          }

          $onefileHelp = & $onefileExe --help 2>&1 | Out-String
          Write-Host $onefileHelp

          if ($onefileHelp -notmatch "--server") {
            throw "Built onefile executable does not contain server mode."
          }

      - name: Add build information
        shell: pwsh
        run: |
          @"
          Product: Anti-PE LightGBM Scanner
          Build: Latency Optimized
          Branch: $env:GITHUB_REF_NAME
          Commit: $env:GITHUB_SHA
          Recommended build: onedir
          Recommended mode: persistent --server
          "@ | Set-Content -Path "dist\BUILD_INFO.txt"

      - name: Copy latency report
        shell: pwsh
        run: |
          if (Test-Path "artifacts\latency\LATENCY_COMPARISON.md") {
            New-Item -ItemType Directory -Force -Path "dist\artifacts\latency"
            Copy-Item `
              "artifacts\latency\LATENCY_COMPARISON.md" `
              "dist\artifacts\latency\LATENCY_COMPARISON.md"
          }

      - name: Show final package tree
        shell: pwsh
        run: |
          tree dist /F

      - name: Upload optimized Windows handover
        uses: actions/upload-artifact@v4
        with:
          name: anti_pe_scanner_latency_optimized_windows_handover
          path: dist/
          if-no-files-found: error
