name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows-exe:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Run tests
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          python -m pytest

      - name: Build Windows executable
        shell: pwsh
        env:
          PYTHONPATH: src
        run: |
          python tools\build_exe.py

      - name: Show dist tree
        shell: pwsh
        run: |
          tree dist /F

      - name: Smoke test EXE on non-PE file
        shell: pwsh
        run: |
          dist\anti_pe_scanner.exe --file README.md --pretty

      - name: Upload Windows handover package
        uses: actions/upload-artifact@v4
        with:
          name: anti_pe_scanner_windows_handover
          path: dist/
